<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학생 관리 · 사순절 새벽기도</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="top-nav">
  <a href="dashboard.html" class="nav-brand">
    <div class="nav-brand-icon">✦</div>
    <span class="nav-brand-text">사순절 <span>새벽기도</span></span>
  </a>
  <a href="dashboard.html">대시보드</a>
  <a href="index.html">출석 입력</a>
  <a href="students.html" class="active">학생 관리</a>
  <a href="report.html">출석 현황</a>
</nav>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html"><span class="nav-icon">⊞</span>대시보드</a>
    <a href="index.html"><span class="nav-icon">✓</span>출석 입력</a>
    <a href="students.html" class="active"><span class="nav-icon">♟</span>학생 관리</a>
    <a href="report.html"><span class="nav-icon">≡</span>현황</a>
  </div>
</nav>

<div class="page-wrap">

  <div class="page-header">
    <h1>학생 관리</h1>
    <p>학생을 등록하고 관리합니다</p>
  </div>

  <!-- 등록 폼 -->
  <div class="card mb-10">
    <div class="card-title">학생 추가</div>
    <div class="form-row mb-10">
      <div class="form-group">
        <label class="form-label">학년</label>
        <select id="inputGrade" style="width:90px;">
          <option value="1">1학년</option>
          <option value="2">2학년</option>
          <option value="3">3학년</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">반</label>
        <input type="text" id="inputClass" placeholder="예: 1반" style="width:100px;">
      </div>
      <div class="form-group" style="flex:1; min-width:120px;">
        <label class="form-label">이름</label>
        <input type="text" id="inputName" placeholder="이름 입력">
      </div>
      <button class="btn btn-primary" id="btnAdd" style="align-self:flex-end;">추가</button>
    </div>

    <!-- 일괄 입력 -->
    <details style="margin-top:4px;">
      <summary style="font-size:12px; color:var(--text2); cursor:pointer; padding:4px 0; user-select:none;">
        ▸ 일괄 추가 (여러 명)
      </summary>
      <div style="margin-top:10px;">
        <textarea id="bulkInput" placeholder="학년,반,이름 형식으로 한 줄에 한 명씩&#10;예)&#10;1,1반,홍길동&#10;1,1반,김철수&#10;2,2반,이영희" style="height:100px; font-size:12px;"></textarea>
        <button class="btn btn-ghost btn-sm mt-10" id="btnBulkAdd">일괄 추가</button>
      </div>
    </details>
  </div>

  <!-- 학생 목록 -->
  <div class="card">
    <div class="flex justify-between items-center mb-16">
      <span id="stuCount" style="font-size:13px; color:var(--text2);">로딩 중...</span>
      <div style="display:flex; gap:6px; flex-wrap:wrap;" id="gradeFilter">
        <button class="btn btn-ghost btn-sm active-filter" data-grade="all">전체</button>
        <button class="btn btn-ghost btn-sm" data-grade="1">1학년</button>
        <button class="btn btn-ghost btn-sm" data-grade="2">2학년</button>
        <button class="btn btn-ghost btn-sm" data-grade="3">3학년</button>
      </div>
    </div>

    <!-- 모바일: 카드형 / 데스크탑: 테이블 -->
    <div id="mobileList" style="display:none; flex-direction:column; gap:6px;"></div>
    <div class="table-wrap" id="desktopTable">
      <table>
        <thead>
          <tr>
            <th>학년</th><th>반</th><th>이름</th><th>등록일</th><th></th>
          </tr>
        </thead>
        <tbody id="stuTbody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty" style="display:none;">
      <div class="empty-icon">♟</div>등록된 학생이 없습니다
    </div>
  </div>

</div>

<script src="js/supabase-client.js"></script>
<script>
let allStudents = [], currentFilter = 'all';
const gradeClass = g => ['','badge-1','badge-2','badge-3'][g]||'badge-1';

function isMobile() { return window.innerWidth < 768; }

async function load() {
  const { data } = await db.from('students').select('*').eq('is_active',true).order('grade').order('class_name').order('name');
  allStudents = data || [];
  render();
}

function render() {
  const filtered = currentFilter === 'all' ? allStudents : allStudents.filter(s => String(s.grade) === currentFilter);
  document.getElementById('stuCount').textContent = `총 ${allStudents.length}명`;

  if (!filtered.length) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('desktopTable').style.display = 'none';
    document.getElementById('mobileList').style.display = 'none';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  if (isMobile()) {
    document.getElementById('desktopTable').style.display = 'none';
    const ml = document.getElementById('mobileList');
    ml.style.display = 'flex';
    ml.innerHTML = filtered.map(s => `
      <div style="display:flex; align-items:center; gap:10px; padding:12px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px;">
        <span class="badge ${gradeClass(s.grade)}">${s.grade}학년</span>
        <span style="font-size:12px; color:var(--text2);">${s.class_name}</span>
        <span style="font-weight:600; flex:1;">${s.name}</span>
        <button class="btn btn-danger btn-xs" data-id="${s.id}">삭제</button>
      </div>`).join('');
  } else {
    document.getElementById('mobileList').style.display = 'none';
    document.getElementById('desktopTable').style.display = 'block';
    const tbody = document.getElementById('stuTbody');
    tbody.innerHTML = filtered.map(s => `
      <tr>
        <td><span class="badge ${gradeClass(s.grade)}">${s.grade}학년</span></td>
        <td style="color:var(--text2);">${s.class_name}</td>
        <td style="font-weight:500;">${s.name}</td>
        <td style="color:var(--text2); font-family:'DM Mono',monospace; font-size:12px;">${s.created_at.slice(0,10)}</td>
        <td style="text-align:right;"><button class="btn btn-danger btn-xs" data-id="${s.id}">삭제</button></td>
      </tr>`).join('');
  }
}

// 추가
document.getElementById('btnAdd').addEventListener('click', async () => {
  const grade = parseInt(document.getElementById('inputGrade').value);
  const class_name = document.getElementById('inputClass').value.trim();
  const name = document.getElementById('inputName').value.trim();
  if (!class_name || !name) { showToast('반과 이름을 입력하세요','error'); return; }
  const { error } = await db.from('students').insert({ grade, class_name, name, is_active:true });
  if (error) { showToast('추가 실패','error'); return; }
  document.getElementById('inputName').value = '';
  showToast(`${name} 추가 완료`);
  load();
});

document.getElementById('inputName').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btnAdd').click(); });

// 일괄 추가
document.getElementById('btnBulkAdd').addEventListener('click', async () => {
  const raw = document.getElementById('bulkInput').value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const rows = [];
  for (const line of lines) {
    const p = line.split(',');
    if (p.length < 3) { showToast(`형식 오류: "${line}"`, 'error'); return; }
    const grade = parseInt(p[0]);
    if (isNaN(grade)||grade<1||grade>3) { showToast(`학년 오류: "${line}"`, 'error'); return; }
    rows.push({ grade, class_name:p[1].trim(), name:p[2].trim(), is_active:true });
  }
  const { error } = await db.from('students').insert(rows);
  if (error) { showToast('일괄 추가 실패','error'); return; }
  document.getElementById('bulkInput').value = '';
  showToast(`${rows.length}명 추가 완료`);
  load();
});

// 삭제
document.addEventListener('click', async e => {
  const btn = e.target.closest('[data-id]');
  if (!btn || !confirm('삭제하시겠습니까?')) return;
  const { error } = await db.from('students').update({ is_active:false }).eq('id', btn.dataset.id);
  if (error) { showToast('삭제 실패','error'); return; }
  showToast('삭제 완료');
  load();
});

// 필터
document.getElementById('gradeFilter').addEventListener('click', e => {
  const btn = e.target.closest('[data-grade]');
  if (!btn) return;
  currentFilter = btn.dataset.grade;
  document.querySelectorAll('#gradeFilter [data-grade]').forEach(b => b.classList.remove('active-filter'));
  btn.classList.add('active-filter');
  render();
});

window.addEventListener('resize', render);

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

load();
</script>
</body>
</html>
