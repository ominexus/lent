<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출석 현황 · 사순절 새벽기도</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="top-nav">
  <a href="dashboard.html" class="nav-brand">
    <div class="nav-brand-icon">✦</div>
    <span class="nav-brand-text">사순절 <span>새벽기도</span></span>
  </a>
  <a href="dashboard.html">대시보드</a>
  <a href="index.html">출석 입력</a>
  <a href="students.html">학생 관리</a>
  <a href="report.html" class="active">출석 현황</a>
</nav>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html"><span class="nav-icon">⊞</span>대시보드</a>
    <a href="index.html"><span class="nav-icon">✓</span>출석 입력</a>
    <a href="students.html"><span class="nav-icon">♟</span>학생 관리</a>
    <a href="report.html" class="active"><span class="nav-icon">≡</span>현황</a>
  </div>
</nav>

<div class="page-wrap">

  <div class="page-header flex justify-between items-center">
    <div>
      <h1>출석 현황</h1>
      <p>21일 전체 출석 통계</p>
    </div>
    <button class="btn btn-ghost btn-sm" id="btnRefresh">새로고침</button>
  </div>

  <!-- 통계 -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" id="sTotal">-</div><div class="stat-lbl">전체 학생</div></div>
    <div class="stat-card accent"><div class="stat-val" id="sDays">-</div><div class="stat-lbl">진행 일수</div></div>
    <div class="stat-card"><div class="stat-val" id="sAvg">-</div><div class="stat-lbl">평균 출석률</div></div>
    <div class="stat-card"><div class="stat-val" id="sToday">-</div><div class="stat-lbl">오늘 출석</div></div>
  </div>

  <!-- 필터 -->
  <div style="display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;" id="gradeFilter">
    <button class="btn btn-ghost btn-sm active-filter" data-grade="all">전체</button>
    <button class="btn btn-ghost btn-sm" data-grade="1">1학년</button>
    <button class="btn btn-ghost btn-sm" data-grade="2">2학년</button>
    <button class="btn btn-ghost btn-sm" data-grade="3">3학년</button>
  </div>

  <!-- 학생별 출석률 -->
  <div class="card mb-10">
    <div class="card-title">학생별 출석률</div>
    <div class="table-wrap" id="tableWrap">
      <table>
        <thead><tr>
          <th>학년</th><th>반</th><th>이름</th><th>출석</th><th style="min-width:130px;">출석률</th>
        </tr></thead>
        <tbody id="reportTbody"></tbody>
      </table>
    </div>
    <!-- 모바일 카드형 -->
    <div id="mobileReport" style="display:none; flex-direction:column; gap:6px;"></div>
    <div id="emptyState" class="empty" style="display:none;"><div class="empty-icon">📊</div>데이터 없음</div>
  </div>

  <!-- 21일 그리드 -->
  <div class="card">
    <div class="card-title" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <span>일자별 출석 그리드</span>
      <span style="font-weight:400; display:flex; gap:12px;">
        <span style="display:flex; align-items:center; gap:4px;">
          <span style="display:inline-block; width:10px; height:10px; background:var(--green); border-radius:2px;"></span>
          <span style="font-size:10px; color:var(--text2);">출석</span>
        </span>
        <span style="display:flex; align-items:center; gap:4px;">
          <span style="display:inline-block; width:10px; height:10px; background:var(--surface3); border-radius:2px;"></span>
          <span style="font-size:10px; color:var(--text2);">미출석</span>
        </span>
        <span style="display:flex; align-items:center; gap:4px;">
          <span style="display:inline-block; width:10px; height:10px; border:1px solid var(--border); border-radius:2px;"></span>
          <span style="font-size:10px; color:var(--text2);">미진행</span>
        </span>
      </span>
    </div>
    <div class="rg-wrap">
      <div class="rg" id="rgGrid"></div>
    </div>
  </div>

</div>

<script src="supabase-client.js"></script>
<script>
const PRAYER_DATES = [
  '2026-03-12','2026-03-13','2026-03-14',
  '2026-03-16','2026-03-17','2026-03-18','2026-03-19','2026-03-20','2026-03-21',
  '2026-03-23','2026-03-24','2026-03-25','2026-03-26','2026-03-27','2026-03-28',
  '2026-03-30','2026-03-31','2026-04-01','2026-04-02','2026-04-03','2026-04-04'
];

const today = new Date(Date.now() + 9*60*60*1000).toISOString().slice(0,10);
const passedDates = PRAYER_DATES.filter(d => d <= today);
const gradeClass = g => ['','badge-1','badge-2','badge-3'][g]||'badge-1';

let students = [], attendance = [], currentGrade = 'all';

async function loadAll() {
  const [s, a] = await Promise.all([
    db.from('students').select('*').eq('is_active',true).order('grade').order('class_name').order('name'),
    db.from('attendance').select('student_id,date,present').in('date', PRAYER_DATES)
  ]);
  students = s.data || [];
  attendance = a.data || [];
  render();
}

function isMobile() { return window.innerWidth < 768; }

function render() {
  const filtered = currentGrade === 'all' ? students : students.filter(s => String(s.grade) === currentGrade);

  // 통계
  document.getElementById('sTotal').textContent = students.length;
  document.getElementById('sDays').textContent = passedDates.length;
  const possible = students.length * passedDates.length;
  const presentAll = attendance.filter(a => a.present && a.date <= today).length;
  document.getElementById('sAvg').textContent = possible ? Math.round(presentAll/possible*100)+'%' : '0%';
  const todayCnt = attendance.filter(a => a.date === today && a.present).length;
  document.getElementById('sToday').textContent = todayCnt;

  // 학생별 집계
  const attMap = {};
  attendance.forEach(a => { attMap[`${a.student_id}_${a.date}`] = a.present; });

  const rows = filtered.map(s => {
    const cnt = passedDates.filter(d => attMap[`${s.id}_${d}`]).length;
    const rate = passedDates.length ? Math.round(cnt/passedDates.length*100) : 0;
    return { ...s, cnt, rate };
  });

  if (isMobile()) {
    document.getElementById('tableWrap').style.display = 'none';
    document.getElementById('mobileReport').style.display = rows.length ? 'flex' : 'none';
    document.getElementById('emptyState').style.display = rows.length ? 'none' : 'block';
    document.getElementById('mobileReport').innerHTML = rows.map(s => {
      const fillClass = s.rate >= 80 ? 'high' : s.rate >= 50 ? 'mid' : 'low';
      return `
        <div style="padding:12px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
            <span class="badge ${gradeClass(s.grade)}">${s.grade}학년</span>
            <span style="font-size:12px; color:var(--text2);">${s.class_name}</span>
            <span style="font-weight:600;">${s.name}</span>
            <span style="margin-left:auto; font-size:13px; font-weight:700; color:${s.rate>=80?'var(--green)':s.rate>=50?'var(--accent)':'var(--red)'};">${s.rate}%</span>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <div class="prog-bar" style="flex:1;"><div class="prog-fill ${fillClass}" style="width:${s.rate}%;"></div></div>
            <span style="font-size:11px; color:var(--text2); white-space:nowrap;">${s.cnt} / ${passedDates.length}일</span>
          </div>
        </div>`;
    }).join('');
  } else {
    document.getElementById('tableWrap').style.display = 'block';
    document.getElementById('mobileReport').style.display = 'none';
    document.getElementById('emptyState').style.display = rows.length ? 'none' : 'block';
    document.getElementById('reportTbody').innerHTML = rows.map(s => {
      const fillClass = s.rate >= 80 ? 'high' : s.rate >= 50 ? 'mid' : 'low';
      return `<tr>
        <td><span class="badge ${gradeClass(s.grade)}">${s.grade}학년</span></td>
        <td style="color:var(--text2);">${s.class_name}</td>
        <td style="font-weight:500;">${s.name}</td>
        <td style="font-family:'DM Mono',monospace; font-size:12px;">${s.cnt} / ${passedDates.length}</td>
        <td>
          <div style="display:flex; align-items:center; gap:8px;">
            <div class="prog-bar" style="width:90px;"><div class="prog-fill ${fillClass}" style="width:${s.rate}%;"></div></div>
            <span style="font-family:'DM Mono',monospace; font-size:12px; color:var(--text2); width:34px;">${s.rate}%</span>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // 그리드
  const grid = document.getElementById('rgGrid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `160px repeat(21, 26px)`;

  // 헤더
  const nh = document.createElement('div');
  nh.className = 'rg-head'; nh.style.textAlign = 'left'; nh.style.paddingLeft = '8px'; nh.textContent = '이름';
  grid.appendChild(nh);
  PRAYER_DATES.forEach((_,i) => {
    const h = document.createElement('div');
    h.className = 'rg-head'; h.textContent = i+1;
    grid.appendChild(h);
  });

  filtered.forEach(s => {
    const nc = document.createElement('div');
    nc.className = 'rg-name-cell';
    nc.innerHTML = `<span class="badge ${gradeClass(s.grade)}">${s.grade}</span>${s.name}`;
    grid.appendChild(nc);
    PRAYER_DATES.forEach(d => {
      const cell = document.createElement('div');
      const isFuture = d > today;
      if (isFuture) { cell.className = 'rg-dot ft'; }
      else { cell.className = 'rg-dot ' + (attMap[`${s.id}_${d}`] ? 'p' : 'a'); }
      cell.title = `${s.name} · ${d} · ${isFuture ? '미진행' : attMap[`${s.id}_${d}`] ? '출석' : '미출석'}`;
      grid.appendChild(cell);
    });
  });
}

document.getElementById('gradeFilter').addEventListener('click', e => {
  const btn = e.target.closest('[data-grade]');
  if (!btn) return;
  currentGrade = btn.dataset.grade;
  document.querySelectorAll('#gradeFilter [data-grade]').forEach(b => b.classList.remove('active-filter'));
  btn.classList.add('active-filter');
  render();
});

document.getElementById('btnRefresh').addEventListener('click', loadAll);
window.addEventListener('resize', render);

loadAll();
</script>
</body>
</html>
