<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출석 입력 · 사순절 새벽기도</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="top-nav">
  <a href="dashboard.html" class="nav-brand">
    <div class="nav-brand-icon">✦</div>
    <span class="nav-brand-text">사순절 <span>새벽기도</span></span>
  </a>
  <a href="dashboard.html">대시보드</a>
  <a href="index.html" class="active">출석 입력</a>
  <a href="students.html">학생 관리</a>
  <a href="report.html">출석 현황</a>
</nav>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html"><span class="nav-icon">⊞</span>대시보드</a>
    <a href="index.html" class="active"><span class="nav-icon">✓</span>출석 입력</a>
    <a href="students.html"><span class="nav-icon">♟</span>학생 관리</a>
    <a href="report.html"><span class="nav-icon">≡</span>현황</a>
  </div>
</nav>

<div class="page-wrap">

  <div class="page-header flex justify-between items-center">
    <div>
      <h1>출석 입력</h1>
      <p>날짜를 선택하고 출석 여부를 체크하세요</p>
    </div>
    <button class="btn btn-primary" id="btnSave">저장</button>
  </div>

  <!-- 날짜 선택 카드 -->
  <div class="card mb-10">
    <div class="form-group">
      <label class="form-label">날짜 선택</label>
      <select id="dateSelect">
        <option value="">날짜를 선택하세요</option>
      </select>
    </div>
    <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
      <button class="btn btn-ghost btn-sm" id="btnAllPresent">전체 출석</button>
      <button class="btn btn-ghost btn-sm" id="btnAllAbsent">전체 미출석</button>
      <span id="summaryBadge" style="margin-left:auto; display:flex; align-items:center; font-size:12px; color:var(--text2);"></span>
    </div>
  </div>

  <!-- 학년 필터 -->
  <div id="attendanceSection" style="display:none;">
    <div style="display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;" id="gradeFilter">
      <button class="btn btn-ghost btn-sm active-filter" data-grade="all">전체</button>
      <button class="btn btn-ghost btn-sm" data-grade="1">1학년</button>
      <button class="btn btn-ghost btn-sm" data-grade="2">2학년</button>
      <button class="btn btn-ghost btn-sm" data-grade="3">3학년</button>
    </div>

    <div class="att-list" id="attList"></div>
  </div>

  <div id="emptyState" class="empty" style="display:none;">
    <div class="empty-icon">📋</div>
    등록된 학생이 없습니다.<br>
    <a href="students.html" style="color:var(--accent);">학생 관리</a>에서 먼저 추가하세요.
  </div>

</div>

<script src="supabase-client.js"></script>
<script>
const PRAYER_DATES = [
  '2026-03-12','2026-03-13','2026-03-14',
  '2026-03-16','2026-03-17','2026-03-18','2026-03-19','2026-03-20','2026-03-21',
  '2026-03-23','2026-03-24','2026-03-25','2026-03-26','2026-03-27','2026-03-28',
  '2026-03-30','2026-03-31','2026-04-01','2026-04-02','2026-04-03','2026-04-04'
];
const DAY_KO = ['일','월','화','수','목','금','토'];

let students = [], attendanceMap = {}, selectedDate = '', currentGrade = 'all';

function initDateSelect() {
  const sel = document.getElementById('dateSelect');
  const today = new Date().toISOString().slice(0,10);
  PRAYER_DATES.forEach((d,i) => {
    const dow = DAY_KO[new Date(d+'T00:00:00').getDay()];
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = `${i+1}일차  ${d.slice(5).replace('-','/')} (${dow})`;
    if (d === today) opt.selected = true;
    sel.appendChild(opt);
  });
  if (sel.value) loadDate(sel.value);
}

async function loadDate(date) {
  selectedDate = date;
  if (!date) return;
  const { data: stuData } = await db.from('students').select('*').eq('is_active',true).order('grade').order('class_name').order('name');
  students = stuData || [];
  const { data: attData } = await db.from('attendance').select('student_id,present').eq('date',date);
  attendanceMap = {};
  (attData||[]).forEach(r => { attendanceMap[r.student_id] = r.present; });
  renderList();
  document.getElementById('attendanceSection').style.display = students.length ? 'block' : 'none';
  document.getElementById('emptyState').style.display = students.length ? 'none' : 'block';
}

function renderList() {
  const filtered = currentGrade === 'all' ? students : students.filter(s => String(s.grade) === currentGrade);
  const list = document.getElementById('attList');
  list.innerHTML = '';
  const gradeClass = g => ['','badge-1','badge-2','badge-3'][g]||'badge-1';
  filtered.forEach(s => {
    const isPresent = attendanceMap[s.id] ?? false;
    const row = document.createElement('div');
    row.className = 'att-row' + (isPresent ? ' present' : '');
    row.innerHTML = `
      <div class="att-info">
        <span class="badge ${gradeClass(s.grade)}">${s.grade}학년</span>
        <span class="att-meta">${s.class_name}</span>
        <span class="att-name">${s.name}</span>
      </div>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" data-id="${s.id}" ${isPresent?'checked':''}>
          <span class="toggle-track"></span>
        </label>
        <span class="toggle-label ${isPresent?'on':''}">${isPresent?'출석':'미출'}</span>
      </div>`;
    const cb = row.querySelector('input');
    cb.addEventListener('change', () => {
      attendanceMap[s.id] = cb.checked;
      row.className = 'att-row' + (cb.checked ? ' present' : '');
      const lbl = row.querySelector('.toggle-label');
      lbl.textContent = cb.checked ? '출석' : '미출';
      lbl.className = 'toggle-label' + (cb.checked ? ' on' : '');
      updateSummary(filtered);
    });
    list.appendChild(row);
  });
  updateSummary(filtered);
}

function updateSummary(filtered) {
  const cnt = filtered.filter(s => attendanceMap[s.id]).length;
  document.getElementById('summaryBadge').textContent = `${cnt} / ${filtered.length} 명 출석`;
}

document.getElementById('btnSave').addEventListener('click', async () => {
  if (!selectedDate) { showToast('날짜를 선택하세요','error'); return; }
  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '저장 중...';
  const upserts = students.map(s => ({ student_id:s.id, date:selectedDate, present:attendanceMap[s.id]??false }));
  const { error } = await db.from('attendance').upsert(upserts, { onConflict:'student_id,date' });
  btn.disabled = false; btn.textContent = '저장';
  if (error) showToast('저장 실패: '+error.message,'error');
  else showToast('저장 완료 ✓');
});

document.getElementById('btnAllPresent').addEventListener('click', () => { students.forEach(s=>{ attendanceMap[s.id]=true; }); renderList(); });
document.getElementById('btnAllAbsent').addEventListener('click',  () => { students.forEach(s=>{ attendanceMap[s.id]=false; }); renderList(); });
document.getElementById('dateSelect').addEventListener('change', e => loadDate(e.target.value));

document.getElementById('gradeFilter').addEventListener('click', e => {
  const btn = e.target.closest('[data-grade]');
  if (!btn) return;
  currentGrade = btn.dataset.grade;
  document.querySelectorAll('#gradeFilter [data-grade]').forEach(b => b.classList.remove('active-filter'));
  btn.classList.add('active-filter');
  renderList();
});

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

initDateSelect();
</script>
</body>
</html>
